<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Think Again 💭</title>
<a href="vini.html"></a>
<style>
body{
  background: radial-gradient(circle at bottom right, #ffd166 0%, #0f1724 70%);
  font-family: 'Poppins', sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
  position: relative;
}
h1{font-size: 42px;}
button{
  padding: 15px 35px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  font-size: 20px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.yes{background-color: #ff6b81; color: white;}
.no{
  background-color: rgba(255,255,255,0.1);
  color: white;
  position: absolute;
  left: 50%;
  top: 60%;
  transform: translate(-50%, -50%);
}
footer{position: absolute; bottom: 10px; width:100%; text-align:center;}
</style>
</head>
<body>
  <h1>Think Again 💭</h1>
  <p>be mine yaar I love you so much! 💕</p>
  <p>Are you sure? Dil se socho...</p>
  <p>no pr click krne ki try kr hehe (mt krna)</p>
  <div>
    <button class="yes" onclick="window.location.href='yes.html'"><a href="vini.html">YES ❤️</a></button>
    <button class="no" id="noBtn">NO</button>
  </div>
   <footer>
  <p> Made with 💕 by your Dhit</p>
</footer>

<script>
const noBtn = document.getElementById("noBtn");
function randomPosition() {
  const btnW = noBtn.offsetWidth;
  const btnH = noBtn.offsetHeight;
  const padding = 10;
  const x = Math.random() * (window.innerWidth - btnW - padding*2) + padding;
  const y = Math.random() * (window.innerHeight - btnH - padding*2) + padding;
  noBtn.style.left = `${x}px`;
  noBtn.style.top = `${y}px`;
}
noBtn.addEventListener("mouseenter", randomPosition);
noBtn.addEventListener("click", ()=> window.location.href='think-slow.html');
window.addEventListener('resize', randomPosition);
randomPosition();
</script>
  
</body>
</html>
